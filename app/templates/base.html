<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Twilio Event Streams Demo{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
    }
    nav {
      background: #0d1b2a;
      color: #fff;
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav .brand {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #f22f46; /* Twilio red */
    }
    nav a { color: #aaa; text-decoration: none; font-size: 0.875rem; }
    nav a:hover { color: #fff; }
    .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }
    .card h2 { font-size: 0.9rem; font-weight: 600; text-transform: uppercase;
               letter-spacing: 0.06em; color: #666; margin-bottom: 1rem; }
    .btn {
      display: inline-block;
      padding: 0.45rem 1rem;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .btn-primary { background: #f22f46; color: #fff; }
    .btn-primary:hover { background: #d41f35; }
    .btn-secondary { background: #eee; color: #333; }
    .btn-secondary:hover { background: #ddd; }
    select, input[type="date"], input[type="text"], input[type="password"] {
      border: 1px solid #d0d0d0;
      border-radius: 5px;
      padding: 0.4rem 0.65rem;
      font-size: 0.875rem;
      background: #fff;
    }
    select:focus, input:focus { outline: 2px solid #f22f46; outline-offset: 1px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 0.5rem 0.75rem; background: #f8f8fb;
         border-bottom: 2px solid #e8e8f0; font-weight: 600; color: #555;
         white-space: nowrap; }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #eee; }
    tr:hover td { background: #fafafa; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 0.75rem; font-weight: 600;
    }
    .badge-completed { background: #e6f9f0; color: #0d7a4a; }
    .badge-failed    { background: #fdecea; color: #c0392b; }
    .badge-busy      { background: #fff3cd; color: #856404; }
    .badge-no-answer { background: #e9ecef; color: #555; }
    .badge-in-progress { background: #e8f0fe; color: #1a73e8; }
    .badge-default   { background: #eee; color: #555; }
    .pagination { display: flex; gap: 0.5rem; align-items: center;
                  margin-top: 1rem; font-size: 0.875rem; }
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
    .tabs { display: flex; gap: 0; border-bottom: 2px solid #e0e0e0; margin-bottom: 1rem; }
    .tab-btn {
      padding: 0.6rem 1.2rem; border: none; background: none; cursor: pointer;
      font-size: 0.875rem; font-weight: 500; color: #777; border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    .tab-btn.active { color: #f22f46; border-bottom-color: #f22f46; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    #loading-overlay {
      display: none; position: fixed; inset: 0; background: rgba(255,255,255,.6);
      z-index: 100; align-items: center; justify-content: center; font-size: 1.1rem;
    }
    #loading-overlay.visible { display: flex; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav>
  <span class="brand">Twilio Event Streams Demo</span>
  {% if session.get('authenticated') %}
    <a href="/logout">Sign out</a>
  {% endif %}
</nav>
<div id="loading-overlay">Loading&hellip;</div>
{% block body %}{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
